name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          missing=()
          [ -z "$EC2_HOST" ] && missing+=("EC2_HOST")
          [ -z "$EC2_USER" ] && missing+=("EC2_USER")
          [ -z "$EC2_KEY" ] && missing+=("EC2_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Error: The following required secrets are not configured: ${missing[*]}"
            echo "Add them under Settings > Secrets and variables > Actions in the repository."
            exit 1
          fi
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /var/www/tcmedia
            git pull origin main
            npm install
            npm run build
            pm2 restart tcmedia