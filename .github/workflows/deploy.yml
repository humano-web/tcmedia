name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$HOST" ]     && missing="$missing EC2_HOST"
          [ -z "$USERNAME" ] && missing="$missing EC2_USER"
          [ -z "$KEY" ]      && missing="$missing EC2_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "::error::Go to Settings > Secrets and variables > Actions and add each missing secret."
            exit 1
          fi
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USERNAME: ${{ secrets.EC2_USER }}
          KEY: ${{ secrets.EC2_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          timeout: 2m
          script_stop: true
          command_timeout: 30m
          script: |
            set -euxo pipefail

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            nvm install 24
            nvm use 24

            APP_DIR=/var/www/tcmedia
            cd "$APP_DIR"

            git fetch --all --prune
            git reset --hard origin/main

            node -v
            npm -v

            npm ci
            npm run build

            pm2 describe tcmedia >/dev/null 2>&1 \
              && pm2 restart tcmedia --update-env \
              || pm2 start npm --name tcmedia -- start

            pm2 save