name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          timeout: 2m
          script_stop: true
          command_timeout: 30m
          script: |
            set -euxo pipefail

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            nvm install 24
            nvm use 24

            APP_DIR=/var/www/tcmedia
            cd "$APP_DIR"

            git fetch --all --prune
            git reset --hard origin/main

            node -v
            npm -v

            npm ci
            npm run build

            pm2 describe tcmedia >/dev/null 2>&1 \
              && pm2 restart tcmedia --update-env \
              || pm2 start npm --name tcmedia -- start

            pm2 save