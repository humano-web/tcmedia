name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          missing=()
          [ -z "$EC2_HOST" ] && missing+=("EC2_HOST")
          [ -z "$EC2_USER" ] && missing+=("EC2_USER")
          [ -z "$EC2_KEY" ] && missing+=("EC2_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Error: The following required secrets are not configured: ${missing[*]}"
            echo "Add them under Settings > Secrets and variables > Actions in the repository."
            exit 1
          fi
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          timeout: 2m
          script_stop: true
          command_timeout: 30m
          script: |
            set -euxo pipefail

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            nvm install 24
            nvm use 24

            APP_DIR=/var/www/tcmedia
            cd "$APP_DIR"

            git fetch --all --prune
            git reset --hard origin/main

            node -v
            npm -v

            npm ci
            npm run build

            pm2 describe tcmedia >/dev/null 2>&1 \
              && pm2 restart tcmedia --update-env \
              || pm2 start npm --name tcmedia -- start

            pm2 save